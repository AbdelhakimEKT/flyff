name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Hellion.sln

      - name: Build
        run: dotnet build Hellion.sln --no-restore -c Release

      - name: Test
        run: dotnet test test/Hellion.Tests/Hellion.Tests.csproj --no-build -c Release --verbosity normal
